<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% block title %}{{ config.title }}{% endblock %}</title>
        <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}" />

        <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="/atom.xml" />
        <link rel="stylesheet" href="/main.css" />
    </head>
    <body>
        <header class="site-header">
            <a class="site-brand" href="/">
                <span class="site-brand-icon">⟩_</span>
                <span class="site-title">MARIO_M_BLOG</span>
            </a>
            <nav>
                <a href="/">FEED</a>
                <a href="/tags">TAGS</a>
                <a href="/about">ABOUT</a>
                <a href="/atom.xml">RSS</a>
            </nav>
        </header>

        {% block body %}
        <main class="content-wrap">{% block content %}{% endblock %}</main>
        {% endblock %}

        <footer class="site-footer">
            <div class="footer-links">
                <a href="/">FEED</a>
                <a href="/about">README</a>
                <a href="/atom.xml">RSS</a>
            </div>
            <span class="footer-copy">&copy; {{ now() | date(format="%Y") }} MARIO_M_SYS</span>
        </footer>

        <script src="/js/codeblocks.js" defer></script>
    </body>
</html>
